<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 01 - Hệ tính toán phân bố</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6fa;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 8px #0001;
            padding: 32px;
        }

        h1 {
            color: #2d6cdf;
        }

        h2 {
            color: #f50404;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Lab 01 - Hệ tính toán phân bố</h1>
        <h3>Chào mừng đến với web của nhóm 9!</h3>
        <h2 class="server_addr">Địa chỉ IP (fixed): <span id="server_addr">Đang tải...</span></h2>
        <h2 class="http_host">Địa chỉ IP (floating): <span id="http_host">Đang tải...</span></h2>
    </div>
    <script>
        fetch('/server_addr')
            .then(r => r.text())
            .then(data => {
                document.getElementById('server_addr').innerText = data;
            });

        fetch('/http_host')
            .then(r => r.text())
            .then(data => {
                document.getElementById('http_host').innerText = data;
            });
    </script>
</body>

</html>
